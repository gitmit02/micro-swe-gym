# ──────────────────────────────────────────────────────────────────────────────
# Micro-SWE Gym — OpenEnv metadata
# Spec version: 1
# ──────────────────────────────────────────────────────────────────────────────
spec_version: 1

name: micro-swe-gym
version: "1.0.0"
description: >
  A real-world RL environment where an AI agent acts as an Automated PR
  Reviewer/Fixer. The agent receives a broken Python function and must return
  corrected code that passes all deterministic unit tests.

author: "Micro-SWE Gym Team"

tasks:
  - id: 0
    grader: "server.micro_swe_gym_environment:MicroSweGymEnvironment"
  - id: 1
    grader: "server.micro_swe_gym_environment:MicroSweGymEnvironment"
  - id: 2
    grader: "server.micro_swe_gym_environment:MicroSweGymEnvironment"

reward:
  no_compile: 0.15
  compile_fail: 0.501
  all_pass: 0.851

runtime:
  language: python
  version: "3.10"
  max_inference_minutes: 20
  resources:
    vcpus: 2
    memory_gb: 8

endpoints:
  reset: "POST /reset"
  step:  "POST /step"
  state: "GET  /state"
